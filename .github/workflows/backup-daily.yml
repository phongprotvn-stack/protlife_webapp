name: Daily Database Backup

on:
  schedule:
    - cron: "0 3 * * *"    # 03:00 UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Validate password secret
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is empty. Add it in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ SUPABASE_DB_PASSWORD is set (${#DB_PASSWORD} chars)"

      - name: Test network connectivity to pooler
        run: |
          set -euo pipefail
          echo "=== DNS resolution ==="
          getent hosts aws-0-ap-southeast-1.pooler.supabase.com || echo "DNS FAILED"
          echo ""
          echo "=== TCP connectivity (port 5432) ==="
          timeout 5 bash -c "echo > /dev/tcp/aws-0-ap-southeast-1.pooler.supabase.com/5432" && echo "TCP OK" || echo "TCP FAILED"

      - name: Install PostgreSQL 17 client tools
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          echo ""
          echo "=== pg_dump version ==="
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump PostgreSQL database
        env:
          PGHOST: aws-0-ap-southeast-1.pooler.supabase.com
          PGPORT: "5432"
          PGUSER: postgres.hwgrdhnsuvohgtcuemag
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          /usr/lib/postgresql/17/bin/pg_dump --no-owner --no-acl | gzip > protlife-$(date -u +%F).dump.gz
          echo "=== File info ==="
          ls -la protlife-*.dump.gz
          FILESIZE=$(stat -c%s protlife-$(date -u +%F).dump.gz)
          echo "File size: $FILESIZE bytes"

      - name: Install aws-cli for B2
        run: |
          set -euo pipefail
          curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update

      - name: Upload to Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_ENDPOINT_RAW: ${{ secrets.B2_ENDPOINT }}
        run: |
          set -euo pipefail

          DUMP_FILE="protlife-$(date -u +%F).dump.gz"

          # Verify file exists before upload
          if [ ! -f "$DUMP_FILE" ]; then
            echo "::error::Dump file '$DUMP_FILE' not found in $(pwd)"
            ls -la
            exit 1
          fi
          echo "✓ File exists: $DUMP_FILE ($(stat -c%s "$DUMP_FILE") bytes)"

          # Auto-prepend https:// if scheme is missing
          case "$B2_ENDPOINT_RAW" in
            http://*|https://*) B2_ENDPOINT="$B2_ENDPOINT_RAW" ;;
            *) B2_ENDPOINT="https://$B2_ENDPOINT_RAW" ;;
          esac
          echo "✓ Endpoint: $B2_ENDPOINT"

          aws s3 cp "$DUMP_FILE" \
            s3://protlife-backup/db-dumps/daily/$(date -u +%F).dump.gz \
            --endpoint-url "$B2_ENDPOINT" \
            --no-progress \
            --only-show-errors

          echo "✓ Upload complete"
