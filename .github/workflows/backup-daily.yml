name: Daily Database Backup

on:
  schedule:
    - cron: "0 3 * * *"    # 03:00 UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "$DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is empty. Add it in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✓ SUPABASE_DB_URL is set"

      - name: Debug DB_URL shape (safe, no password exposed)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "First 15 chars: ${DB_URL:0:15}"
          echo "Total length: ${#DB_URL}"
          echo "Contains 'postgresql://': $(echo "$DB_URL" | grep -c 'postgresql://' || echo 0)"
          echo "Contains '@': $(echo "$DB_URL" | grep -c '@' || echo 0)"

      - name: Dump PostgreSQL database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          pg_dump "$DB_URL" \
            --no-owner \
            --no-acl \
            | gzip > protlife-$(date -u +%F).dump.gz

      - name: Install aws-cli for B2
        run: |
          set -euo pipefail
          curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update

      - name: Upload to Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_ENDPOINT_RAW: ${{ secrets.B2_ENDPOINT }}
        run: |
          set -euo pipefail

          # Auto-prepend https:// if scheme is missing
          case "$B2_ENDPOINT_RAW" in
            http://*|https://*) B2_ENDPOINT="$B2_ENDPOINT_RAW" ;;
            *) B2_ENDPOINT="https://$B2_ENDPOINT_RAW" ;;
          esac

          # Extract region from B2 S3 endpoint (format: https://s3.<region>.backblazeb2.com)
          B2_REGION=$(echo "$B2_ENDPOINT" | sed -E 's|https://s3\.([^.]+)\..*|\1|')

          aws s3 cp protlife-$(date -u +%F).dump.gz \
            s3://protlife-backup/db-dumps/daily/$(date -u +%F).dump.gz \
            --endpoint-url "$B2_ENDPOINT" \
            --region "$B2_REGION"
